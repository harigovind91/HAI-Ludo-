<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H A I H A I VIRAL - Global Ludo Ecosystem</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #FFD700;
            --dark: #050505;
            --red: #ff3e3e;
            --green: #2ecc71;
            --blue: #3498db;
            --yellow: #f1c40f;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--dark);
            color: white;
            margin: 0;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- Header & Branding --- */
        header {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.9);
            border-bottom: 2px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-family: 'Orbitron', sans-serif; color: var(--gold); font-weight: bold; font-size: 1.4rem; }
        
        /* --- Wallet & Profile Section --- */
        .user-panel {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .wallet-badge {
            background: var(--glass);
            border: 1px solid var(--gold);
            padding: 5px 12px;
            border-radius: 20px;
            color: var(--gold);
            font-weight: bold;
        }

        /* --- Main Game Layout --- */
        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* --- Global Players List --- */
        .player-list-sidebar {
            width: 280px;
            background: var(--glass);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            height: 450px;
            overflow-y: auto;
        }

        .online-indicator { color: #00ff00; font-size: 0.8rem; margin-bottom: 10px; }

        .player-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .player-card:hover { border: 1px solid var(--gold); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold); }

        /* --- Ludo Board --- */
        #ludo-board {
            width: 450px;
            height: 450px;
            background: white;
            border: 10px solid var(--gold);
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            box-shadow: 0 0 50px rgba(255,215,0,0.2);
        }

        .house { grid-column: span 6; grid-row: span 6; border: 1px solid #000; position: relative; }
        .h-red { background: var(--red); }
        .h-green { background: var(--green); }
        .h-blue { background: var(--blue); }
        .h-yellow { background: var(--yellow); }

        .center-logo {
            grid-area: 7 / 7 / 10 / 10;
            background: var(--dark);
            border: 2px solid var(--gold);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            color: var(--gold);
            text-align: center;
        }

        /* --- Recharge & Bidding --- */
        .action-panel {
            width: 100%;
            max-width: 400px;
            background: var(--glass);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-recharge { background: var(--green); color: white; }
        .btn-bid { background: var(--gold); color: black; }

        /* --- Chat & Voice --- */
        .comm-panel {
            width: 100%;
            max-width: 450px;
            height: 120px;
            background: #111;
            border: 1px solid #333;
            margin-top: 15px;
            border-radius: 10px;
            padding: 10px;
            font-size: 0.9rem;
            overflow-y: auto;
        }

        .voice-active { color: var(--gold); font-size: 0.8rem; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        @media (max-width: 600px) {
            #ludo-board { width: 90vw; height: 90vw; }
            .player-list-sidebar { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">H A I H A I VIRAL</div>
        <div class="user-panel">
            <div class="wallet-badge">💰 <span id="balance">0.00</span></div>
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Hari" class="avatar" alt="User">
        </div>
    </header>

    <div class="main-container">
        <div class="player-list-sidebar">
            <div class="online-indicator">● 4,821 Players Online Worldwide</div>
            <h3>Global Lobby</h3>
            <div id="player-feed">
                <div class="player-card" onclick="invitePlayer('Alex')">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex" class="avatar">
                    <div><strong>Alex (USA)</strong><br><small>Level 15</small></div>
                </div>
                <div class="player-card" onclick="invitePlayer('Sakura')">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sakura" class="avatar">
                    <div><strong>Sakura (Japan)</strong><br><small>Level 22</small></div>
                </div>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center;">
            <div id="ludo-board">
                <div class="house h-red"></div>
                <div class="house h-green"></div>
                <div class="house h-blue"></div>
                <div class="house h-yellow"></div>
                <div class="center-hub center-logo">HAIHAI<br>GLOBAL</div>
            </div>
            
            <div class="comm-panel" id="global-chat">
                <div style="color: grey;">[System]: Welcome to HAIHAI Global Node.</div>
                <div class="voice-active">🎤 Voice Chat: Connected (4 Active)</div>
            </div>
        </div>

        <div class="action-panel">
            <h3>💰 GAME ECONOMY</h3>
            <select id="player-mode" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #222; color: #fff; border: 1px solid var(--gold);">
                <option value="2">2 Players (Quick Match)</option>
                <option value="3">3 Players (Classic)</option>
                <option value="4">4 Players (Squad War)</option>
            </select>
            
            <input type="number" id="bid-amount" placeholder="Enter Bidding Amount ($)" style="width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 5px;">
            
            <button class="btn btn-bid" onclick="placeBid()">Start Match & Bid</button>
            <button class="btn btn-recharge" onclick="openRecharge()">Recharge Wallet (UPI/Intl)</button>
            
            <p style="font-size: 0.7rem; color: #888; margin-top: 10px;">
                Admin Commission: 10% auto-deduct to Harigovind's Bank.
            </p>
        </div>
    </div>

    <script>
        // --- Core Configuration ---
        const ADMIN_UPI = "harigovindsingh91-2@oksbi";
        const INTL_UPI = "harigovindsingh91-2@okaxis";
        let myBalance = 500.00; // Simulated wallet
        
        document.getElementById('balance').innerText = myBalance.toFixed(2);

        // --- Recharge System (All Methods) ---
        function openRecharge() {
            const amount = prompt("Enter amount to recharge (INR/USD):", "100");
            if (amount) {
                // Generates UPI Intent Link
                const upiUrl = `upi://pay?pa=${ADMIN_UPI}&pn=Harigovind&am=${amount}&cu=INR&tn=HAIHAI_WALLET_RECHARGE`;
                
                // For Mobile: Redirects to GPay/PhonePe
                if(/Android|iPhone/i.test(navigator.userAgent)) {
                    window.location.href = upiUrl;
                } else {
                    alert(`To Recharge:\n1. Open Banking App\n2. Pay to: ${ADMIN_UPI}\n3. Use International ID: ${INTL_UPI} for foreign cards.`);
                }
            }
        }

        // --- Bidding & Commission Logic ---
        function placeBid() {
            const bid = parseFloat(document.getElementById('bid-amount').value);
            if (isNaN(bid) || bid <= 0) {
                alert("Please enter a valid bid amount to play.");
                return;
            }

            if (bid > myBalance) {
                alert("Insufficient funds! Please recharge your HAIHAI wallet.");
                return;
            }

            // Commission Calculation (10%)
            const commission = bid * 0.10;
            const finalPool = (bid - commission) * 2; // Assuming 1v1 match

            myBalance -= bid;
            document.getElementById('balance').innerText = myBalance.toFixed(2);

            alert(`Match Started!\nBid: $${bid}\nAdmin Commission ($${commission.toFixed(2)}) sent to ${ADMIN_UPI}.\nWinner will get: $${finalPool.toFixed(2)}`);
            
            startDiceRoll();
        }

        // --- Dice & Game Logic ---
        function startDiceRoll() {
            // Simulated Dice for Global Sync
            const result = Math.floor(Math.random() * 6) + 1;
            const chat = document.getElementById('global-chat');
            const msg = document.createElement('div');
            msg.innerHTML = `<strong>[You]:</strong> Rolled 🎲 ${result} (Global Node Synced)`;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        function invitePlayer(name) {
            alert(`Invite sent to ${name}. Waiting for global node acceptance...`);
        }

        // --- Multi-Language Placeholder ---
        function setLanguage(lang) {
            console.log("HAIHAI: Setting interface to " + lang);
        }

        // --- PWA Installation Simulation ---
        window.addEventListener('beforeinstallprompt', (e) => {
            console.log("HAIHAI: Ready to download as APK.");
        });
    </script>
</body>
</html>
